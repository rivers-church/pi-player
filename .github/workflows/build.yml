name: Go

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v7

    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Build
      run: go build -ldflags "-X main.version=${{ github.ref_name }}" -o pi-player

    - name: Test
      run: go test -v ./...

    - name: Release
      uses: softprops/action-gh-release@v3
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: ./pi-player

