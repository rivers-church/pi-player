# Copy this file to inventory.yml (gitignored) and fill in your device IPs.
#
# Devices are grouped by location so you can target a single site:
#   ansible-playbook ... --limit lounge
#
# ansible_user must match the username set during install.

all:
  vars:
    ansible_user: pi

  children:
    lounge:
      hosts:
        192.168.1.100:
        192.168.1.101:

    hall:
      hosts:
        192.168.1.200:
