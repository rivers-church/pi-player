---
# Configure the SMB network mount from device-local facts seeded by install.sh.
# Per-device values come from ansible_local.pi_player.*; the password lives only
# in /etc/samba/credentials (written by install.sh, never templated here).
- name: Configure SMB network mount.
  when: ansible_local.pi_player.mount_enabled | default(false) | bool
  block:
    - name: Resolve target user's uid/gid for mount ownership.
      ansible.builtin.getent:
        database: passwd
        key: "{{ target_user }}"

    - name: Derive the systemd mount unit name from the mount point.
      ansible.builtin.command:
        cmd: "systemd-escape --path --suffix=mount {{ ansible_local.pi_player.mount_where }}"
      register: mount_unit
      changed_when: false

    - name: Create the mount point directory.
      ansible.builtin.file:
        path: "{{ ansible_local.pi_player.mount_where }}"
        state: directory
        mode: '0755'

    - name: Template the systemd mount unit.
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/networkshare.mount.j2"
        dest: "/etc/systemd/system/{{ mount_unit.stdout }}"
        mode: '0644'
      register: mount_unit_file

    - name: Enable and (re)start the network share mount.
      ansible.builtin.systemd_service:
        name: "{{ mount_unit.stdout }}"
        enabled: true
        state: "{{ 'restarted' if mount_unit_file.changed else 'started' }}"
        daemon_reload: true
