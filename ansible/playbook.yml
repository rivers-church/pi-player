---
- name: Pi-Player setup for Arch Linux + Hyprland Kiosk
  hosts: localhost
  connection: local

  vars:
    ansible_python_interpreter: python3
    target_user: "{{ pi_user | default(ansible_facts['user_id']) }}"

  tasks:
    - name: Initial setup requiring root access.
      become: true
      block:
        - name: Install essential packages.
          community.general.pacman:
            name:
              - chromium
              - base-devel  # Required for yay
              - wget
              - hyprland
              - nodejs # required by neovim plugins
              - cifs-utils  # Required for SMB mounts
              - swayosd  # OSD for volume/brightness
              - fwupd  # Firmware update tool (provides fwupdmgr)
              - udisks2  # Disk management daemon
              - ethtool
              - gtk-layer-shell  # Required by swayosd
            state: present
            update_cache: true

        - name: Add the current user to the input group.
          ansible.builtin.user:
            name: '{{ target_user }}'
            groups: input
            append: true

        - name: Configure the SMB network mount (from install-time device facts).
          ansible.builtin.include_tasks: tasks/network-mount.yml

        - name: Create the `aur_builder` user.
          ansible.builtin.user:
            name: aur_builder
            create_home: yes
            group: wheel

        - name: Allow the `aur_builder` user to run `sudo pacman` without a password.
          ansible.builtin.lineinfile:
            path: /etc/sudoers.d/11-install-aur_builder
            line: 'aur_builder ALL=(ALL) NOPASSWD: /usr/bin/pacman'
            create: yes
            mode: 0644
            validate: 'visudo -cf %s'

        - name: Install yay AUR helper.
          become_user: aur_builder
          kewlfft.aur.aur:
            name: yay
            use: makepkg
            state: present

        - name: Install AUR packages with yay.
          become_user: aur_builder
          kewlfft.aur.aur:
            name:
              - neovim
              - ghostty
              - ttf-firacode-nerd
            use: yay
            state: present

    - name: Install LazyVim.
      become: true
      block:
        - name: Check if nvim config exists.
          ansible.builtin.stat:
            path: /home/{{ target_user }}/.config/nvim
          register: nvim_config

        - name: Clone LazyVim starter config.
          ansible.builtin.git:
            repo: https://github.com/LazyVim/starter
            dest: /home/{{ target_user }}/.config/nvim
            depth: 1
          when: not nvim_config.stat.exists

        - name: Set ownership of nvim config.
          ansible.builtin.file:
            path: /home/{{ target_user }}/.config/nvim
            owner: "{{ target_user }}"
            group: "{{ target_user }}"
            recurse: true
          when: not nvim_config.stat.exists

        - name: Remove .git directory from nvim config.
          ansible.builtin.file:
            path: /home/{{ target_user }}/.config/nvim/.git
            state: absent
          when: not nvim_config.stat.exists

    - name: Ensure user config directory is owned by the user.
      become: true
      ansible.builtin.file:
        path: /home/{{ target_user }}/.config
        state: directory
        mode: '0755'
        owner: "{{ target_user }}"
        group: "{{ target_user }}"

    - name: Create a directory for the pi-player binary.
      become: true
      ansible.builtin.file:
        name: /home/{{ target_user }}/.local/bin
        state: directory
        mode: "0744"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"

    - name: Create pi-player config directory.
      become: true
      ansible.builtin.file:
        path: /home/{{ target_user }}/.config/pi-player
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0755'

    - name: Write default pi-player config.json (skipped if already exists).
      become: true
      ansible.builtin.copy:
        dest: /home/{{ target_user }}/.config/pi-player/config.json
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0600'
        force: false
        content: |
          {
            "Location": "PiPlayer",
            "Mount": {
              "URL": "{{ ansible_local.pi_player.piplayer_dir | default(ansible_local.pi_player.mount_where) | default('/home/' + target_user + '/Documents/pi-player') }}"
            },
            "AudioOutput": "",
            "Streamer": "",
            "Debug": true,
            "Login": {},
            "Remote": {
              "Names": ["keyboard"],
              "Vendor": 0,
              "Product": 0
            }
          }

    - name: Download the pi-player binary.
      become: true
      ansible.builtin.get_url:
        url: https://github.com/rivers-church/pi-player/releases/latest/download/pi-player
        dest: /home/{{ target_user }}/.local/bin/
        mode: '0744'
        owner: "{{ target_user }}"
        group: "{{ target_user }}"

    - name: Create systemd user service directory.
      become: true
      ansible.builtin.file:
        name: /home/{{ target_user }}/.config/systemd/user
        state: directory
        mode: "0744"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"

    - name: Download systemd service file for pi-player.
      become: true
      ansible.builtin.get_url:
        url: https://github.com/rivers-church/pi-player/raw/master/services/pi-player.service
        dest: /home/{{ target_user }}/.config/systemd/user/
        mode: "0744"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"

    - name: Create Hyprland config directory.
      become: true
      ansible.builtin.file:
        name: /home/{{ target_user }}/.config/hypr
        state: directory
        mode: "0755"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"

    - name: Download Hyprland config file.
      become: true
      ansible.builtin.get_url:
        url: https://github.com/rivers-church/pi-player/raw/master/scripts/hyprland.conf
        dest: /home/{{ target_user }}/.config/hypr/hyprland.conf
        mode: '0644'
        owner: "{{ target_user }}"
        group: "{{ target_user }}"

    - name: Auto-start Hyprland on login.
      become: true
      ansible.builtin.blockinfile:
        path: /home/{{ target_user }}/.bash_profile
        create: true
        mode: '0644'
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - Auto-start Hyprland"
        block: |
          # Start Hyprland on tty1
          if [ -z "$DISPLAY" ] && [ "$(tty)" = "/dev/tty1" ]; then
            exec start-hyprland
          fi

    - name: Remove setup MOTD.
      become: true
      ansible.builtin.file:
        path: /etc/motd
        state: absent

    - name: Suppress sshd last-login banner.
      become: true
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config.d/99-archlinux.conf
        line: PrintLastLog no
        regexp: '^PrintLastLog'
        create: true
        mode: '0644'
      notify: Reload sshd

  handlers:
    - name: Reload sshd
      become: true
      ansible.builtin.systemd_service:
        name: sshd
        state: reloaded
