---
- name: Pi-Player setup for Arch Linux + Hyprland Kiosk
  hosts: localhost
  connection: local

  vars:
    ansible_python_interpreter: python3
    pi_user: "{{ pi_user | default(ansible_facts['user_id']) }}"

  tasks:
    - name: Initial setup requiring root access.
      become: true
      block:
        - name: Install essential packages.
          community.general.pacman:
            name:
              - chromium
              - base-devel  # Required for yay
              - wget
              - hyprland
              - nodejs # required by neovim plugins
              - cifs-utils  # Required for SMB mounts
              - swayosd  # OSD for volume/brightness
              - fwupd  # Firmware update tool (provides fwupdmgr)
              - udisks2  # Disk management daemon
              - ethtool
              - gtk-layer-shell  # Required by swayosd
            state: present
            update_cache: true

        - name: Add the current user to the input group.
          ansible.builtin.user:
            name: '{{ pi_user }}'
            groups: input
            append: true

        - name: Create getty service override directory.
          ansible.builtin.file:
            path: /etc/systemd/system/getty@tty1.service.d
            state: directory
            mode: '0755'

        - name: Enable automatic login.
          ansible.builtin.copy:
            dest: /etc/systemd/system/getty@tty1.service.d/autologin.conf
            content: |
              [Service]
              ExecStart=
              ExecStart=-/sbin/agetty -o '-p -f -- \\u' --noclear --autologin {{ pi_user }} %I $TERM
            backup: true

        - name: Create mount point for network share.
          ansible.builtin.file:
            path: /mnt/networkshare
            state: directory
            mode: '0755'

        - name: Create samba credentials directory.
          ansible.builtin.file:
            path: /etc/samba
            state: directory
            mode: '0755'

        - name: Check if local mount file exists.
          ansible.builtin.stat:
            path: "{{ playbook_dir }}/../services/mnt-networkshare.mount"
          register: local_mount_file
          delegate_to: localhost
          become: false

        - name: Check if local credentials file exists.
          ansible.builtin.stat:
            path: "{{ playbook_dir }}/../services/samba-credentials"
          register: local_credentials_file
          delegate_to: localhost
          become: false

        - name: Copy mount unit file if it exists.
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/../services/mnt-networkshare.mount"
            dest: /etc/systemd/system/mnt-networkshare.mount
            mode: '0644'
          when: local_mount_file.stat.exists

        - name: Copy samba credentials file if it exists.
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/../services/samba-credentials"
            dest: /etc/samba/credentials
            mode: '0600'
          when: local_credentials_file.stat.exists

        - name: Enable network share mount.
          ansible.builtin.systemd_service:
            name: mnt-networkshare.mount
            enabled: true
          when: local_mount_file.stat.exists and local_credentials_file.stat.exists

        - name: Create the `aur_builder` user.
          ansible.builtin.user:
            name: aur_builder
            create_home: yes
            group: wheel

        - name: Allow the `aur_builder` user to run `sudo pacman` without a password.
          ansible.builtin.lineinfile:
            path: /etc/sudoers.d/11-install-aur_builder
            line: 'aur_builder ALL=(ALL) NOPASSWD: /usr/bin/pacman'
            create: yes
            mode: 0644
            validate: 'visudo -cf %s'

        - name: Install yay AUR helper.
          become_user: aur_builder
          kewlfft.aur.aur:
            name: yay
            use: makepkg
            state: present

        - name: Install AUR packages with yay.
          become_user: aur_builder
          kewlfft.aur.aur:
            name:
              - neovim
              - ghostty
              - ttf-firacode-nerd
            use: yay
            state: present

    - name: Install LazyVim.
      become: true
      block:
        - name: Check if nvim config exists.
          ansible.builtin.stat:
            path: /home/{{ pi_user }}/.config/nvim
          register: nvim_config

        - name: Clone LazyVim starter config.
          ansible.builtin.git:
            repo: https://github.com/LazyVim/starter
            dest: /home/{{ pi_user }}/.config/nvim
            depth: 1
          when: not nvim_config.stat.exists

        - name: Set ownership of nvim config.
          ansible.builtin.file:
            path: /home/{{ pi_user }}/.config/nvim
            owner: "{{ pi_user }}"
            group: "{{ pi_user }}"
            recurse: true
          when: not nvim_config.stat.exists

        - name: Remove .git directory from nvim config.
          ansible.builtin.file:
            path: /home/{{ pi_user }}/.config/nvim/.git
            state: absent
          when: not nvim_config.stat.exists

    - name: Create a directory for the pi-player binary.
      become: true
      ansible.builtin.file:
        name: /home/{{ pi_user }}/.local/bin
        state: directory
        mode: "0744"
        owner: "{{ pi_user }}"
        group: "{{ pi_user }}"

    - name: Download the pi-player binary.
      become: true
      ansible.builtin.get_url:
        url: https://github.com/rivers-church/pi-player/releases/latest/download/pi-player
        dest: /home/{{ pi_user }}/.local/bin/
        mode: '0744'
        owner: "{{ pi_user }}"
        group: "{{ pi_user }}"

    - name: Create systemd user service directory.
      become: true
      ansible.builtin.file:
        name: /home/{{ pi_user }}/.config/systemd/user
        state: directory
        mode: "0744"
        owner: "{{ pi_user }}"
        group: "{{ pi_user }}"

    - name: Download systemd service file for pi-player.
      become: true
      ansible.builtin.get_url:
        url: https://github.com/rivers-church/pi-player/raw/master/services/pi-player.service
        dest: /home/{{ pi_user }}/.config/systemd/user/
        mode: "0744"
        owner: "{{ pi_user }}"
        group: "{{ pi_user }}"

    - name: Create Hyprland config directory.
      become: true
      ansible.builtin.file:
        name: /home/{{ pi_user }}/.config/hypr
        state: directory
        mode: "0755"
        owner: "{{ pi_user }}"
        group: "{{ pi_user }}"

    - name: Download Hyprland config file.
      become: true
      ansible.builtin.get_url:
        url: https://github.com/rivers-church/pi-player/raw/master/scripts/hyprland.conf
        dest: /home/{{ pi_user }}/.config/hypr/hyprland.conf
        mode: '0644'
        owner: "{{ pi_user }}"
        group: "{{ pi_user }}"

    - name: Auto-start Hyprland on login.
      become: true
      ansible.builtin.blockinfile:
        path: /home/{{ pi_user }}/.bash_profile
        create: true
        mode: '0644'
        owner: "{{ pi_user }}"
        group: "{{ pi_user }}"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - Auto-start Hyprland"
        block: |
          # Start Hyprland on tty1
          if [ -z "$DISPLAY" ] && [ -n "$XDG_VTNR" ] && [ "$XDG_VTNR" -eq 1 ]; then
            exec Hyprland
          fi
