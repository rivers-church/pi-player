# Copy this file to secrets.yml (gitignored) and fill in your values.
#
# Run with:
#   ansible-playbook -i ansible/inventory.yml ansible/maintenance.yml \
#     --extra-vars "@ansible/secrets.yml" -K

# --- Package updates ---------------------------------------------------------
# Set to false to skip system and AUR package updates on this run.
update_packages: true

# --- Network mount -----------------------------------------------------------
# Remove this section to leave the current mount configuration unchanged.
mount_what: "//fileserver/media"       # UNC path to the share
mount_where: /mnt/media                # local mount point
mount_user: mediauser                  # share username
mount_password: yourpassword           # share password
mount_domain: ""                       # Windows domain — leave blank if not required

# --- Device location label ---------------------------------------------------
# Shown in the pi-player web interface header and used to identify the device.
# device_location: Main Auditorium

# --- Hostname ----------------------------------------------------------------
# new_hostname: pi-lounge

# --- User password -----------------------------------------------------------
# The username is the one created during install (ansible_user in inventory.yml).
# user_password: newpassword
